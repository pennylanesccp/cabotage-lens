[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "carbon-footprint"
version = "1.4.0"
description = "Multimodal freight assessment of logistics cost and carbon footprint."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "requests",
    "pandas",
    "openpyxl",
    "CurrencyConverter",
    "pyinstaller",
    "tkintermapview",
    "beautifulsoup4",
    "streamlit",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["modules*"]
