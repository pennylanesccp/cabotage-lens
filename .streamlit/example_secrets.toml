# Copy this file to `.streamlit/secrets.toml` for local runs.
# Never commit real credentials.

ORS_API_KEY = "your-openrouteservice-key"
# Optional fallback geocoder / directions provider.
LOCATIONIQ_PAT = "your-locationiq-private-token"

# Supabase Postgres is the only durable database backend.
SUPABASE_DB_URL = "postgresql://postgres:your-password@db.your-project-ref.supabase.co:5432/postgres?sslmode=require"

# Optional Supabase Storage archival for compressed JSONL logs.
SUPABASE_URL = "https://your-project-ref.supabase.co"
SUPABASE_KEY = "your-anon-or-service-role-key"
# SUPABASE_SERVICE_ROLE_KEY = "your-service-role-key"
SUPABASE_STORAGE_LOGS_BUCKET = "carbon-logs"

LOG_LEVEL = "INFO"
LOG_ARCHIVE_ENABLED = false
