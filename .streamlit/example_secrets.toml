# Copy this file to `.streamlit/secrets.toml` for local runs.
# Never commit real credentials.

APP_PASSWORD = "choose-a-shared-password"
# Optional Cloudflare Turnstile gate. Leave both unset for password-only local development.
# TURNSTILE_SITE_KEY = "your-turnstile-site-key"
# TURNSTILE_SECRET_KEY = "your-turnstile-secret-key"

ORS_API_KEY = "your-openrouteservice-key"
# Optional fallback geocoder / directions provider.
LOCATIONIQ_PAT = "your-locationiq-private-token"

# Supabase Postgres is the only durable database backend.
# The app builds SUPABASE_DB_URL from these values automatically.
SUPABASE_PROJECT_REF = "your-project-ref"
SUPABASE_DB_HOST = "aws-0-your-region.pooler.supabase.com"
SUPABASE_DB_PORT = 6543
SUPABASE_DB_NAME = "postgres"
SUPABASE_DB_USER = "postgres.your-project-ref"
SUPABASE_DB_PASSWORD = "your-db-password"
SUPABASE_DB_SSLMODE = "require"
# Optional explicit override if you already have a full DSN:
# SUPABASE_DB_URL = "postgresql://postgres.your-project-ref:your-db-password@aws-0-your-region.pooler.supabase.com:6543/postgres?sslmode=require"

# Optional Supabase Storage archival for compressed JSONL logs.
SUPABASE_URL = "https://your-project-ref.supabase.co"
SUPABASE_KEY = "your-anon-or-service-role-key"
# SUPABASE_SERVICE_ROLE_KEY = "your-service-role-key"
SUPABASE_STORAGE_LOGS_BUCKET = "carbon-logs"

LOG_LEVEL = "INFO"
LOG_ARCHIVE_ENABLED = false
