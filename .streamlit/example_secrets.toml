# Copy this file to .streamlit/secrets.toml for local runs, or paste the same
# keys into Streamlit Community Cloud > App > Settings > Secrets.
ORS_API_KEY = "your-openrouteservice-key"
# Optional ORS fallback for geocoding and directions when ORS times out,
# is rate-limited, or returns no usable result.
LOCATIONIQ_PAT = "your-locationiq-private-token"
SUPABASE_PROJECT_REF = "your-project-ref"
SUPABASE_DB_PASSWORD = "your-supabase-password"
SUPABASE_DB_PORT = 5432
# Optional overrides:
# SUPABASE_DB_HOST = "db.your-project-ref.supabase.co"
# SUPABASE_DB_NAME = "postgres"
# SUPABASE_DB_USER = "postgres"
# SUPABASE_DB_SSLMODE = "require"
CARBON_WRITE_LOG_FILE = false
